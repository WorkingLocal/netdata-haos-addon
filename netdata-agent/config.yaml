name: "Netdata Agent"
description: "Real-time performance monitoring for the Home Assistant host. Streams CPU, RAM, disk and network metrics to a self-hosted Netdata parent."
version: "1.0.0"
slug: "netdata_agent"
url: "https://github.com/WorkingLocal/netdata-haos-addon"
init: false
arch:
  - amd64
  - aarch64
startup: services
boot: auto
host_network: true
host_pid: true
options:
  hostname: "haos"
  streaming_enabled: false
  parent_url: ""
  api_key: ""
schema:
  hostname: str
  streaming_enabled: bool
  parent_url: str
  api_key: str
